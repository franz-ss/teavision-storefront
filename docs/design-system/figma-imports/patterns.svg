    <rect width="1312" height="200" rx="8" fill="#FFFFFF" stroke="#E7E7E5"/>

    <!-- Header row -->
    <rect width="1312" height="40" fill="#F2EFE9"/>
    <text x="20" y="26" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#777671">GRADE</text>
    <text x="380" y="26" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#777671">CUP CHARACTER</text>
    <text x="700" y="26" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#777671">BREW TIME</text>
    <text x="1162" y="26" text-anchor="end" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#777671">PACK SIZES (KG)</text>
    <text x="1188" y="26" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#777671">LEAD TIME</text>

    <!-- Rows -->
    <g transform="translate(0,40)">
      <line x1="0" y1="40" x2="1312" y2="40" stroke="#E7E7E5"/>
      <text x="20" y="26" font-size="13" font-weight="500" fill="#100F0D">FBOP — Flowery Broken Orange Pekoe</text>
      <text x="380" y="26" font-size="13" fill="#25241F">Brisk, bright, floral notes</text>
      <text x="700" y="26" font-size="13" fill="#25241F">3–4 min @ 95°C</text>
      <text x="1162" y="26" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#25241F">1, 5, 25</text>
      <text x="1188" y="26" font-size="13" fill="#25241F">5–7 days</text>
    </g>
    <g transform="translate(0,80)">
      <line x1="0" y1="40" x2="1312" y2="40" stroke="#E7E7E5"/>
      <text x="20" y="26" font-size="13" font-weight="500" fill="#100F0D">OP1 — Orange Pekoe Grade 1</text>
      <text x="380" y="26" font-size="13" fill="#25241F">Smooth, full-bodied, malty</text>
      <text x="700" y="26" font-size="13" fill="#25241F">3–4 min @ 95°C</text>
      <text x="1162" y="26" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#25241F">1, 5, 25</text>
      <text x="1188" y="26" font-size="13" fill="#25241F">5–7 days</text>
    </g>
    <g transform="translate(0,120)">
      <line x1="0" y1="40" x2="1312" y2="40" stroke="#E7E7E5"/>
      <text x="20" y="26" font-size="13" font-weight="500" fill="#100F0D">BOP — Broken Orange Pekoe</text>
      <text x="380" y="26" font-size="13" fill="#25241F">Strong, robust, briskest cup</text>
      <text x="700" y="26" font-size="13" fill="#25241F">3 min @ 95°C</text>
      <text x="1162" y="26" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#25241F">5, 25</text>
      <text x="1188" y="26" font-size="13" fill="#25241F">7–10 days</text>
    </g>
    <g transform="translate(0,160)">
      <text x="20" y="26" font-size="13" font-weight="500" fill="#100F0D">CTC — Crush Tear Curl</text>
      <text x="380" y="26" font-size="13" fill="#25241F">Bold, ideal for milk tea</text>
      <text x="700" y="26" font-size="13" fill="#25241F">2–3 min @ 95°C</text>
      <text x="1162" y="26" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#25241F">25, 50</text>
      <text x="1188" y="26" font-size="13" fill="#25241F">10–14 days</text>
    </g>
