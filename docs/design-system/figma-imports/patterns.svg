<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2700" viewBox="0 0 1440 2700" font-family="Inter, system-ui, sans-serif">
  <style>
    .lbl-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;fill:#777671}
    .lbl-h1{font-family:'Fraunces','Times New Roman',serif;font-size:48px;font-weight:500;letter-spacing:-1px;fill:#100F0D}
    .lbl-h2{font-family:'Fraunces','Times New Roman',serif;font-size:30px;font-weight:500;letter-spacing:-0.5px;fill:#100F0D}
    .lbl-h3{font-family:'Fraunces','Times New Roman',serif;font-size:24px;font-weight:500;letter-spacing:-0.3px;fill:#100F0D}
    .lbl-body{font-size:14px;fill:#4F4E4A}
    .lbl-mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;fill:#777671}
    .divider{stroke:#E7E7E5;stroke-width:1}
    .input-bg{fill:#FFFFFF;stroke:#C9C9C5}
    .input-text{font-size:14px;fill:#25241F}
    .input-placeholder{font-size:14px;fill:#777671}
    .input-label{font-size:13px;font-weight:500;fill:#100F0D}
    .input-helper{font-size:11px;fill:#777671}
    .card-bg{fill:#FFFFFF;stroke:#E7E7E5}
  </style>

  <rect width="1440" height="2700" fill="#FAF7F2"/>

  <text x="64" y="100" class="lbl-eyebrow">TEAVISION DESIGN SYSTEM</text>
  <text x="64" y="148" class="lbl-h1">Patterns</text>
  <text x="64" y="180" class="lbl-body">Composed components · Quote form · Mega menu · FAQ · Testimonials · Spec table</text>

  <line x1="64" y1="220" x2="1376" y2="220" class="divider"/>

  <!-- ===== QUOTE REQUEST FORM ===== -->
  <text x="64" y="270" class="lbl-eyebrow">QUOTE REQUEST FORM</text>
  <text x="64" y="310" class="lbl-h2">Request a quote</text>
  <text x="64" y="340" class="lbl-body">Most-important conversion surface. We respond within 1 business day.</text>

  <g transform="translate(64,376)">
    <rect width="800" height="660" rx="8" fill="#FFFFFF" stroke="#E7E7E5"/>

    <!-- Row 1 -->
    <text x="32" y="44" class="input-label">Your name *</text>
    <rect x="32" y="56" width="352" height="40" rx="6" class="input-bg"/>
    <text x="44" y="81" class="input-placeholder">Full name</text>

    <text x="416" y="44" class="input-label">Business name *</text>
    <rect x="416" y="56" width="352" height="40" rx="6" class="input-bg"/>
    <text x="428" y="81" class="input-placeholder">Café, restaurant, brand</text>

    <!-- Row 2 -->
    <text x="32" y="136" class="input-label">Work email *</text>
    <rect x="32" y="148" width="352" height="40" rx="6" class="input-bg"/>
    <text x="44" y="173" class="input-placeholder">you@business.com.au</text>

    <text x="416" y="136" class="input-label">Phone</text>
    <rect x="416" y="148" width="352" height="40" rx="6" class="input-bg"/>
    <text x="428" y="173" class="input-placeholder">+61 …</text>

    <!-- Row 3 -->
    <text x="32" y="228" class="input-label">Country / region</text>
    <rect x="32" y="240" width="352" height="40" rx="6" class="input-bg"/>
    <text x="44" y="265" class="input-text">Australia</text>
    <path d="M362 258 L370 258 L366 262 Z" fill="#25241F"/>

    <text x="416" y="228" class="input-label">Estimated volume *</text>
    <rect x="416" y="240" width="352" height="40" rx="6" class="input-bg"/>
    <text x="428" y="265" class="input-text">20 – 100 kg</text>
    <path d="M746 258 L754 258 L750 262 Z" fill="#25241F"/>

    <!-- Products full row -->
    <text x="32" y="320" class="input-label">Products of interest</text>
    <rect x="32" y="332" width="736" height="40" rx="6" class="input-bg"/>
    <text x="44" y="357" class="input-placeholder">e.g. Black Assam, Earl Grey, native blends</text>

    <!-- Message full row -->
    <text x="32" y="412" class="input-label">Message *</text>
    <rect x="32" y="424" width="736" height="100" rx="6" class="input-bg"/>
    <text x="44" y="449" class="input-placeholder">Tell us about your project, packaging, deadlines, anything we should know.</text>

    <!-- Inline reassurance alert -->
    <g transform="translate(32,548)">
      <rect width="736" height="56" rx="6" fill="#E8EFF7"/>
      <rect width="3" height="56" fill="#2E5A99"/>
      <circle cx="28" cy="28" r="9" stroke="#1A344E" stroke-width="1.5" fill="none"/>
      <text x="28" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#1A344E">i</text>
      <text x="48" y="24" font-size="13" font-weight="500" fill="#1A344E">Response time</text>
      <text x="48" y="42" font-size="13" fill="#25241F">Our trade team responds within 1 business day. For urgent requests, call +61 (0)2 …</text>
    </g>

    <!-- Submit row -->
    <text x="32" y="640" class="input-helper">By submitting, you agree to our Privacy policy.</text>
    <rect x="572" y="616" width="196" height="48" rx="6" fill="#100F0D"/>
    <text x="670" y="645" text-anchor="middle" font-size="16" font-weight="500" fill="#FAF7F2">Request a quote →</text>
  </g>

  <line x1="64" y1="1080" x2="1376" y2="1080" class="divider"/>

