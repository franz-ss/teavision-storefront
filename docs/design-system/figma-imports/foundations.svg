  <text x="64" y="1720" class="lbl-mono">heading/02 · Fraunces 36/44</text>
  <text x="64" y="1768" font-family="Fraunces, 'Times New Roman', serif" font-size="36" font-weight="500" letter-spacing="-0.7" fill="#100F0D">Wild grown, certified organic.</text>

  <text x="64" y="1820" class="lbl-mono">body · Inter 16/24</text>
  <text x="64" y="1858" font-family="Inter" font-size="16" fill="#25241F">Recent studies show specialty tea consumption growing at 6% per year, led by functional and Australian-native blends.</text>

  <text x="64" y="1900" class="lbl-mono">label · Inter 14/20 · 500</text>
  <text x="64" y="1934" font-family="Inter" font-size="14" font-weight="500" fill="#25241F">Pack size · 1 kg</text>

