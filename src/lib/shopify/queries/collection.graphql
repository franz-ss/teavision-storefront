query GetCollection($handle: String!) {
  collection(handle: $handle) {
    id
    handle
    title
    description
    descriptionHtml
    updatedAt
    image {
      url
      altText
      width
      height
    }
    seo {
      title
      description
    }
  }
}

query GetCollectionProducts(
  $handle: String!
  $first: Int!
  $after: String
  $sortKey: ProductCollectionSortKeys
  $reverse: Boolean
  $filters: [ProductFilter!]
) {
  collection(handle: $handle) {
    products(
      first: $first
      after: $after
      sortKey: $sortKey
      reverse: $reverse
      filters: $filters
    ) {
      pageInfo {
        hasNextPage
        endCursor
      }
      filters {
        id
        label
        type
        values {
          id
          label
          count
          input
        }
      }
      edges {
        node {
          id
          handle
          title
          availableForSale
          productType
          tags
          featuredImage {
            url
            altText
            width
            height
          }
          priceRange {
            minVariantPrice {
              amount
              currencyCode
            }
          }
          options {
            name
            values
          }
          ratingMetafield: metafield(namespace: "reviews", key: "rating") {
            value
          }
          ratingCountMetafield: metafield(
            namespace: "reviews"
            key: "rating_count"
          ) {
            value
          }
          variants(first: 10) {
            edges {
              node {
                id
                title
                availableForSale
                image {
                  url
                  altText
                  width
                  height
                }
                price {
                  amount
                  currencyCode
                }
              }
            }
          }
        }
      }
    }
  }
}

query GetCollections($first: Int!, $after: String) {
  collections(first: $first, after: $after) {
    pageInfo {
      hasNextPage
      endCursor
    }
    edges {
      node {
        handle
      }
    }
  }
}

query GetCollectionSummaries($first: Int!, $after: String) {
  collections(first: $first, after: $after) {
    pageInfo {
      hasNextPage
      endCursor
    }
    edges {
      node {
        id
        handle
        title
        description
        updatedAt
        image {
          url
          altText
          width
          height
        }
        seo {
          title
          description
        }
      }
    }
  }
}
