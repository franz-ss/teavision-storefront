query SearchProducts($query: String!) {
  predictiveSearch(query: $query, types: [PRODUCT]) {
    products {
      id
      handle
      title
      featuredImage {
        url
        altText
        width
        height
      }
      priceRange {
        minVariantPrice {
          amount
          currencyCode
        }
      }
      ratingMetafield: metafield(namespace: "reviews", key: "rating") {
        value
      }
      ratingCountMetafield: metafield(
        namespace: "reviews"
        key: "rating_count"
      ) {
        value
      }
    }
  }
}
